model:
  in_channels: 3
  out_channels: 3
  features: [64, 128, 256]
  use_batch_norm: true
  dropout_rate: 0.3

data:
  data_dir: "data"
  image_size: 128
  train_split: 0.70
  val_split: 0.15
  num_workers: 0

training:
  batch_size: 16
  epochs: 50
  learning_rate: 0.0002
  scheduler:
    patience: 5
    factor: 0.5

loss:
  type: "combined"
  l1_weight: 1.0
  ssim_weight: 0.5
  perceptual_weight: 0.04

output:
  save_dir: "experiments"
  save_every: 10

accelerator:
  device: "auto"
